<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalypto — AI Research Assistant </title>
  <link href = "https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg: #590569;
      --surface: ;
      --surface2: ;
      --border: ;
      --accent: ;
      --accent2: ;
      --danger: ;
      --text: ;
      --muted: ;
      --user-bg: ;
      --ai-bg: ;
      --font-head: 'Syne', sans-serif;
      --font-body: 'Inter', monospace;
      --radius: 12px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header{
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .logo span {
      color: var(--text);
    }
    .status-pill {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .status-pill.has-paper {
      border-color: var(--accent);
      color: var(--accent);
    }
    .app {
      display: flex;
      flex: 1;
      height: calc(100vh - 57px);
      overflow: hidden;
    }
    .sidebar {
      width: 280px;
      min-width: 240px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }
    .sidebar-top {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }
    .new-chat-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
      font-weight: 500;
    }
    .new-chat-btn:hover {
      background: rgba(12, 255, 178, 0.08);
    }
    .chat-list-section {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-list-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 8px 8px;
    }
    .chat-entry {
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid transparent;
    }
    .chat-entry:hover {
      background: var(--surface2);
    }
    .chat-entry.active {
      background: var(--surface2);
      border-color: var(--border);
    }
    .chat-entry-info {
      flex: 1;
      min-width: 0;
    }
    .chat-entry-paper {
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .chat-entry-preview {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .chat-entry-date {
      font-size: 9px;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .chat-delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .chat-entry:hover .chat-delete-btn {
      opacity: 1;
    }
    .chat-delete-btn:hover {
      color: var(--danger);
    }
    .no-chats {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 20px 8px;
      line-height: 1.6;
    }
    .section-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 10px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.3px;
    }
    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
    }
    .tab-panel {
      display: none;
    }
    .tab-panel.active {
      display: block;
    }
    .url-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 11px;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .url-input:focus {
      outline: none;
      border-color: var(--accent2);
    }
    .url-input::placeholder {
      color: var(--muted);
    }
    .url-fetch-btn {
      background: var(--accent2);
      border: none;
      border-radius: 8px;
      padding: 0 12px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .url-fetch-btn:hover {
      opacity: 0.85;
    }
    .url-fetch-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .url-hint {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .url hint a {
      color: var(--accent2);
      text-decoration: none;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124, 255, 178, 0.04);
    }
    .drag-zone input[type = "file"]{
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon {
      font-size: 22px;
      margin-bottom: 6px;
      display: block;
    }
    .drop-text {
      font-size: 11px;
      color: var(--muted);
    }
    .drop-text strong {
      color: var(--text);
      display: block;
      margin-bottom: 2px;
    }
    .paper-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: none;
      margin-top: 8px;
    }
    .paper-card.visible {
      display: block;
    }
    .paper-title {
      font-size: 11px; font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .paper-meta {
      font-size: 10px;
      color: var(--muted);
    }
    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .quick-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 11px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .quick-btn:hover {
      border-color: var(--accent2);
      background: rgba(79,140,255,0.06);
      color: var(--accent2);
    }
    .quick-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-header span {
      color: var(--text);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }


  </style>
</head>
<body>
  
</body>
</html>
